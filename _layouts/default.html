<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">

    <title>{{ page.title }}</title>
    {% if page.description %}
    <meta name="description" content="{{ page.description }}">
    {% else %}
    <meta name="description" content="{{ site.description }}">
    {% endif %}
    <meta name="author" content="Moe Lwin Hein">

    <meta property="og:title" content="{{ page.title }}">
    {% if page.description %}
    <meta property="og:description" content="{{ page.description }}">
    {% else %}
    <meta property="og:description" content="{{ site.description }}">
    {% endif %}
    <meta property="og:url" content="{{ site.url }}">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="author" href="https://plus.google.com/u/0/+moelwinhein">
    <link href="{{ site.url }}{{ page.url | remove: "index.html" }}" rel="canonical">
    <link rel="stylesheet" href="/assets/stylesheets/main.css">
</head>

<body>

<header class="header"></header>

<div class="content">
    <div class="container">
        {{ content }}
    </div>
</div>

<footer class="footer">
    <div class="container">
        <div class="links"></div>
        <div class="copyright">
            &copy; 2018 Moe Lwin Hein. Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> and <a href="https://github.com/" target="_blank">Github</a>.
        </div>
    </div>
</footer>

</body>
</html>
